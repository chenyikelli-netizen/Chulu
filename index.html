<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>撥雲見月 - Sample</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&display=swap');

    @font-face {
      font-family: 'Iansui';
      src: url('assets/Iansui-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #F4F1DE;
      /* 溫暖紙張色 */
      font-family: 'Iansui', 'Noto Serif TC', serif;
      color: #3D405B;
      /* 溫潤的深藍灰，取代純黑 */
    }

    /* 模擬的首頁內容 */
    .homepage-mock {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: url('assets/banner.png') center/cover no-repeat;
      color: #3D405B;

      /* 初始狀態：模糊且稍微暗一點 */
      filter: blur(15px) brightness(0.7);
      transform: scale(1.05);
      transition: filter 4s cubic-bezier(0.3, 0, 0.2, 1), transform 4s cubic-bezier(0.3, 0, 0.2, 1);
    }

    .homepage-mock h1 {
      font-size: 4rem;
      font-weight: 900;
      margin-bottom: 10px;
      text-shadow: 0 4px 15px rgba(255, 255, 255, 0.5);
    }

    .homepage-mock p {
      font-size: 1.25rem;
      color: #E07A5F;
      /* 改為陶土色 */
      font-weight: 600;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.9), 0 2px 4px rgba(255, 255, 255, 0.8);
    }

    /* 雲霧容器 */
    .clouds-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    /* 單片雲霧，替換成真實圖片 */
    .cloud {
      position: absolute;
      background-size: cover;
      /* 讓圖片填滿指定的區域 */
      background-position: center;
      background-repeat: no-repeat;
      /* 放慢動畫至 4 秒，讓雲氣散開更有史詩感 */
      transition: transform 4s cubic-bezier(0.3, 0, 0.2, 1), opacity 4s cubic-bezier(0.3, 0, 0.2, 1);
    }

    /* 佈置 5 片雲，增加大小與中央覆蓋率 */
    .cloud-1 {
      top: -40%;
      left: -40%;
      width: 120%;
      height: 120%;
      background-image: url('assets/fog_6.png');
      opacity: 0.95;
    }

    .cloud-2 {
      top: -40%;
      right: -40%;
      width: 120%;
      height: 120%;
      background-image: url('assets/fog_6.png');
      opacity: 0.95;
      /* 鏡像翻轉，增加自然感 */
      transform: scaleX(-1);
    }

    .cloud-3 {
      bottom: -40%;
      left: -40%;
      width: 120%;
      height: 120%;
      background-image: url('assets/fog_6.png');
      opacity: 0.95;
    }

    .cloud-4 {
      bottom: -40%;
      right: -40%;
      width: 120%;
      height: 120%;
      background-image: url('assets/fog_6.png');
      opacity: 0.95;
      /* 上下翻轉 */
      transform: scaleY(-1);
    }



    /* ====== 動畫觸發後的狀態 ====== */

    /* 首頁變清晰 */
    body.is-clearing .homepage-mock {
      filter: blur(0px) brightness(1);
      transform: scale(1);
    }

    /* 雲霧向四周推移、放大（營造逼近相機後消失的感覺）、並漸漸透明 */
    body.is-clearing .cloud-1 {
      transform: translate(-30%, -30%) scale(1.5);
      opacity: 0;
    }

    body.is-clearing .cloud-2 {
      /* 注意：保留原有的 scaleX(-1) 屬性 */
      transform: translate(30%, -30%) scaleX(-1) scale(1.5);
      opacity: 0;
    }

    body.is-clearing .cloud-3 {
      transform: translate(-30%, 30%) scale(1.5);
      opacity: 0;
    }

    body.is-clearing .cloud-4 {
      /* 注意：保留原有的 scaleY(-1) 屬性 */
      transform: translate(30%, 30%) scaleY(-1) scale(1.5);
      opacity: 0;
    }



    /* 控制按鈕 */
    .controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
    }

    .controls button {
      padding: 10px 24px;
      font-size: 16px;
      font-family: inherit;
      background: #12151a;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      /* 預設隱藏 */
      visibility: hidden;
      /* 徹底隱藏，不可點擊 */
      transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out;
    }

    /* 當動畫啟動後，延遲顯示按鈕 */
    /* 最終標題文字容器 */
    .final-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -46%) scale(0.96);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      /* 初始不可點擊 */
      transition: opacity 1.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                  transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                  visibility 1.2s ease-in-out;
      z-index: 50;
    }

    body.show-final-text .final-content {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
      /* 出現後可點擊 */
    }

    /* 初路卡片樣式 */
    .chulu-card {
      position: relative;
      width: 480px;
      min-height: 320px;
      background: rgba(253, 251, 247, 0.85); /* 溫暖紙張Frosted Glass */
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2px solid rgba(224, 122, 95, 0.25); /* 陶土紅微透邊框，對應圖中紅色框 */
      border-radius: 28px;
      padding: 40px;
      box-sizing: border-box;
      box-shadow: 0 30px 60px rgba(61, 64, 91, 0.08), 
                  0 0 0 1px rgba(255, 255, 255, 0.5) inset;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .card-inner {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .card-inner.hidden {
      opacity: 0;
      transform: translateY(15px);
      pointer-events: none;
      position: absolute;
    }

    .card-inner.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      position: relative;
    }

    .card-title {
      font-size: 3.2rem;
      font-weight: 900;
      margin: 0 0 12px 0;
      letter-spacing: 8px;
      margin-right: -8px;
      color: #3D405B;
      font-family: 'Iansui', 'Noto Serif TC', serif;
    }

    .card-subtitle {
      font-size: 1.1rem;
      color: #5D607B;
      margin: 0 0 32px 0;
      letter-spacing: 2px;
      font-weight: 500;
      line-height: 1.5;
    }

    .card-subtitle.italic-quote {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #E07A5F;
      font-style: italic;
      font-weight: 600;
      max-width: 380px;
      border-left: 2px solid rgba(224, 122, 95, 0.4);
      padding-left: 12px;
      margin-bottom: 28px;
      text-align: left;
    }

    .action-buttons {
      display: flex;
      gap: 20px;
      width: 100%;
      justify-content: center;
    }

    .action-buttons.vertical {
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }

    /* 新版按鈕樣式 */
    .chulu-btn {
      padding: 16px 28px;
      font-size: 1.1rem;
      font-weight: 600;
      font-family: 'Iansui', serif;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      text-decoration: none;
    }

    /* 背景建構按鈕：Morandi 陶土色系 */
    .btn-bg {
      background: rgba(224, 122, 95, 0.08);
      border: 1.5px solid rgba(224, 122, 95, 0.4);
      color: #E07A5F;
    }

    .btn-bg:hover {
      background: #E07A5F;
      color: #FFFFFF;
      box-shadow: 0 8px 20px rgba(224, 122, 95, 0.25);
      transform: translateY(-2px);
    }

    .btn-bg:active {
      transform: translateY(0) scale(0.98);
    }

    /* 方向選擇按鈕：Morandi 綠色系 */
    .btn-menu {
      background: rgba(129, 178, 154, 0.08);
      border: 1.5px solid rgba(129, 178, 154, 0.4);
      color: #81B29A;
    }

    .btn-menu:hover {
      background: #81B29A;
      color: #FFFFFF;
      box-shadow: 0 8px 20px rgba(129, 178, 154, 0.25);
      transform: translateY(-2px);
    }

    .btn-menu:active {
      transform: translateY(0) scale(0.98);
    }

    /* 次級描述按鈕：縱向排列，高度較高，有文字簡述 */
    .btn-sub {
      background: rgba(61, 64, 91, 0.04);
      border: 1.5px solid rgba(61, 64, 91, 0.2);
      color: #3D405B;
      padding: 16px 20px;
      align-items: flex-start;
      text-align: left;
    }

    .btn-sub:hover {
      background: rgba(61, 64, 91, 0.08);
      border-color: #3D405B;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(61, 64, 91, 0.1);
    }

    .btn-sub:active {
      transform: translateY(0) scale(0.99);
    }

    .btn-sub .btn-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .btn-sub .btn-desc {
      font-size: 0.85rem;
      color: #7F8497;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .btn-sub:hover .btn-desc {
      color: #3D405B;
    }

    /* 返回按鈕 */
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: #7F8497;
      font-family: 'Iansui', serif;
      font-size: 0.95rem;
      font-weight: 600;
      margin-top: 28px;
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 6px 12px;
      border-radius: 12px;
    }

    .back-btn:hover {
      color: #E07A5F;
      background: rgba(224, 122, 95, 0.05);
    }

    .back-btn svg {
      transition: transform 0.2s ease;
    }

    .back-btn:hover svg {
      transform: translateX(-3px);
    }

    /* 左上角 Icon 樣式 */
    .site-icon {
      position: absolute;
      top: 0px;
      left: 40px;
      width: 80px;
      /* 控制 icon 大小 */
      height: auto;
      z-index: 60;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      /* 初始不可點擊 */
      transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out;
    }

    body.show-final-text .site-icon {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      /* 出現後可點擊 */
    }

    /* 強制瞬間重設，不帶動畫 */
    body.no-transition .cloud,
    body.no-transition .homepage-mock,
    body.no-transition .homepage-mock h1,
    body.no-transition .homepage-mock p,
    body.no-transition .final-content,
    body.no-transition .chulu-btn,
    body.no-transition .site-icon,
    body.no-transition .controls button {
      transition: none !important;
    }

    /* 1. 紙張紋理 - 提高透明度並增加混合模式 */
    .noise-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.06;
      /* 從 0.04 提高 */
      mix-blend-mode: multiply;
      background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
    }



    /* 6. 塵埃粒子 */
    .dust-motes {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 25;
      /* 位於雲朵與主內容之間 */
      overflow: hidden;
    }

    .mote {
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      filter: blur(1.5px);
      animation: floatUp linear infinite;
      box-shadow: 0 0 4px rgba(255, 255, 255, 0.8);
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }

      20% {
        opacity: 0.8;
      }

      80% {
        opacity: 0.6;
      }

      100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
      }
    }
    /* 跳過動畫的快速樣式 */
    body.skip-anim * {
      transition: none !important;
      animation: none !important;
    }
  </style>
</head>

<body>

  <!-- 環境裝飾元素 -->
  <div class="noise-overlay"></div>

  <div class="dust-motes" id="dust-motes"></div>

  <!-- 左上角 Icon -->
  <img src="assets/icon.png" class="site-icon" alt="Career Match Icon">

  <!-- 初始首頁內容 -->
  <div class="homepage-mock">
    <h1>撥雲見月</h1>
    <p>這是一個開場動畫展示範例</p>
  </div>

  <!-- 最終顯示內容 -->
  <div class="final-content">
    <div class="chulu-card" id="chulu-card">
      <!-- 主選單內層 (預設顯示) -->
      <div class="card-inner visible" id="card-inner-main">
        <h2 class="card-title">初路</h2>
        <p class="card-subtitle">初級大人的職涯探索之路</p>
        
        <div class="action-buttons">
          <button class="chulu-btn btn-bg" onclick="showBgConstruction()">背景建構</button>
          <button class="chulu-btn btn-menu" onclick="window.location.href='flow-pages.html?step=page-menu'">方向選擇</button>
        </div>
      </div>
      
      <!-- 背景建構次級選單內層 -->
      <div class="card-inner hidden" id="card-inner-bg">
        <h2 class="card-title" style="font-size: 2.6rem;">背景建構</h2>
        <p class="card-subtitle italic-quote">
          「當東西總是被扣除，要平衡好『想要』與『需要』，但我們可愛的小腦袋一次處理一件事就夠了。」
        </p>
        
        <div class="action-buttons vertical">
          <button class="chulu-btn btn-sub" onclick="window.location.href='flow-pages.html?step=page-want-or-not'">
            <span class="btn-title">有沒有方向</span>
            <span class="btn-desc">不用醒來的美夢 (Want)</span>
          </button>
          <button class="chulu-btn btn-sub" onclick="window.location.href='flow-pages.html?step=page-can-or-not'">
            <span class="btn-title">能力轉譯</span>
            <span class="btn-desc">是現實，是現況，肚皮要吃飽 (Able)</span>
          </button>
        </div>
        
        <button class="back-btn" onclick="showMainMenu()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          返回
        </button>
      </div>
    </div>
  </div>

  <!-- 雲霧層 -->
  <div class="clouds-container">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="cloud cloud-4"></div>

  </div>

  <!-- 重播按鈕 -->
  <div class="controls">
    <button onclick="replayAnimation()">重新觀看動畫</button>
  </div>

  <script>
    let textTimer;

    // 建立塵埃粒子
    function createDustMotes() {
      const container = document.getElementById('dust-motes');
      if (!container) return;
      const moteCount = 15;
      for (let i = 0; i < moteCount; i++) {
        const mote = document.createElement('div');
        mote.classList.add('mote');

        const size = Math.random() * 4 + 2;
        const left = Math.random() * 100;
        const duration = Math.random() * 15 + 10;
        const delay = Math.random() * -20;

        mote.style.width = `${size}px`;
        mote.style.height = `${size}px`;
        mote.style.left = `${left}vw`;
        mote.style.animationDuration = `${duration}s`;
        mote.style.animationDelay = `${delay}s`;

        container.appendChild(mote);
      }
    }

    // 啟動動畫序列
    function startSequence() {
      // 0.8秒後開始撥雲
      setTimeout(() => {
        document.body.classList.add('is-clearing');

        // 撥雲開始後 3.5 秒 (總共約 4.3 秒)，切換到最終文字
        textTimer = setTimeout(() => {
          document.body.classList.add('show-final-text');
        }, 3500);
      }, 800);
    }

    window.addEventListener('load', () => {
      createDustMotes();

      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('from') === 'flow') {
        // 直接進入最終狀態
        document.body.classList.add('skip-anim');
        document.body.classList.add('is-clearing');
        document.body.classList.add('show-final-text');
        
        // 稍微延遲移除 skip-anim，讓後續的手動操作（如重新觀看）可以有動畫
        setTimeout(() => {
          document.body.classList.remove('skip-anim');
        }, 100);
      } else {
        startSequence();
      }
    });

    function showBgConstruction() {
      const card = document.getElementById('chulu-card');
      const mainInner = document.getElementById('card-inner-main');
      const bgInner = document.getElementById('card-inner-bg');
      
      mainInner.classList.remove('visible');
      mainInner.classList.add('hidden');
      
      bgInner.classList.remove('hidden');
      bgInner.classList.add('visible');
      
      // 動態微調卡片高度以適應次級選單
      card.style.minHeight = '420px';
    }

    function showMainMenu() {
      const card = document.getElementById('chulu-card');
      const mainInner = document.getElementById('card-inner-main');
      const bgInner = document.getElementById('card-inner-bg');
      
      bgInner.classList.remove('visible');
      bgInner.classList.add('hidden');
      
      mainInner.classList.remove('hidden');
      mainInner.classList.add('visible');
      
      card.style.minHeight = '320px';
    }

    function replayAnimation() {
      // 清除計時器防止衝突
      clearTimeout(textTimer);

      // 1. 瞬間回到初始狀態
      document.body.classList.add('no-transition');
      document.body.classList.remove('is-clearing');
      document.body.classList.remove('show-final-text');
      
      // 確保卡片重設回主選單
      showMainMenu();

      void document.body.offsetHeight;
      document.body.classList.remove('no-transition');

      // 2. 重新啟動序列
      setTimeout(startSequence, 50);
    }
  </script>
</body>

</html>
